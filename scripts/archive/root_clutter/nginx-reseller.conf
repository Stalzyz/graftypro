# Reseller Catch-all Nginx Configuration
# This configuration allows any domain pointed to this server IP to be served by the Wabot BSP application.
# Individual reseller branding is resolved by the application based on the Host header.

server {
    listen 80;
    server_name _; # Catch-all for any domain not matched by other server blocks

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy to the application
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Access and Error logs
    access_log /var/log/nginx/reseller_catchall.access.log;
    error_log /var/log/nginx/reseller_catchall.error.log;
}
