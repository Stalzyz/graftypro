services:
  web:
    image: grafty-app:latest
    build:
      context: .
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@grafty_bsp-postgres-1:5432/grafty_bsp?schema=public
      - REDIS_URL=redis://grafty_bsp-redis-1:6379
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - grafty

  worker:
    image: grafty-app:latest
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@grafty_bsp-postgres-1:5432/grafty_bsp?schema=public
      - REDIS_HOST=grafty_bsp-redis-1
      - REDIS_PORT=6379
    command: npx tsx worker.ts
    networks:
      - grafty

networks:
  grafty:
    external: true
    name: grafty_bsp_default
